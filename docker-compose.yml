version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://settl:settl@postgres:5432/settl
      REDIS_URL: redis://redis:6379
      NOMBA_BASE_URL: ${NOMBA_BASE_URL}
      NOMBA_PARENT_ACCOUNT_ID: ${NOMBA_PARENT_ACCOUNT_ID}
      NOMBA_CLIENT_ID: ${NOMBA_CLIENT_ID}
      NOMBA_CLIENT_SECRET: ${NOMBA_CLIENT_SECRET}
      NOMBA_WEBHOOK_SECRET: ${NOMBA_WEBHOOK_SECRET}
      PORT: 3000
      NODE_ENV: development
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "npx prisma migrate deploy && node src/index.js"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: settl
      POSTGRES_USER: settl
      POSTGRES_PASSWORD: settl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U settl"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
