name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: settl_test
          POSTGRES_USER: settl
          POSTGRES_PASSWORD: settl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client and run migrations
        run: npx prisma generate && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://settl:settl_test@localhost:5432/settl_test

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://settl:settl_test@localhost:5432/settl_test
          REDIS_URL: redis://localhost:6379
          NOMBA_BASE_URL: http://localhost:9999
          NOMBA_PARENT_ACCOUNT_ID: test-id
          NOMBA_CLIENT_ID: test-client-id
          NOMBA_CLIENT_SECRET: test-secret
          NOMBA_WEBHOOK_SECRET: NombaHackathon2026
          NODE_ENV: test
          LOG_LEVEL: error
